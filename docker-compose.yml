services:
  web:
    build: ./frontend
    ports: ["3000:3000"]
    env_file: .env
    depends_on: [api]
    volumes:
      - ./frontend:/app
  api:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on: [mongo, redis]
  worker:
    build: ./backend
    command: sh -c "rq worker -u $REDIS_URL creatorflow"
    env_file: .env
    depends_on: [redis]
  mongo:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7
volumes:
  mongo_data:
